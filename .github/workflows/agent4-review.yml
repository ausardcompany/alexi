name: "Agent 4: Code Review & QA"

# Thin caller: delegates the agent run to the factory with role=quality.
# The prepare job runs CI checks on the PR branch and renders the review
# prompt with check results + failure logs, then passes it to the factory.
# `commit_changes: false` because reviews must NOT push to the PR branch.

on:
  pull_request:
    types: [opened, synchronize]
    branches: [master]
    paths:
      - 'src/**'
      - 'tests/**'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

concurrency:
  group: agent4-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Run CI checks and build review prompt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only review PRs from bot branches (auto-implement or auto-fix)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.user.login == 'github-actions[bot]' ||
       contains(github.event.pull_request.head.ref, 'auto/'))
    outputs:
      pr_number: ${{ steps.pr_info.outputs.pr_number }}
      branch: ${{ steps.pr_info.outputs.branch }}
      task_prompt: ${{ steps.build.outputs.task_prompt }}
    steps:
      - name: Determine PR info
        id: pr_info
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            BRANCH="${{ github.event.pull_request.head.ref }}"
          else
            PR_NUMBER="${{ inputs.pr_number }}"
            BRANCH=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" --jq '.head.ref')
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "PR #$PR_NUMBER on branch: $BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr_info.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks
        id: checks
        continue-on-error: true
        run: |
          RESULTS=""
          ALL_PASSED=true

          run_check() {
            local name="$1"
            local cmd="$2"
            if eval "$cmd" > /tmp/check-$name.log 2>&1; then
              echo "[PASS] $name"
              RESULTS="$RESULTS\n- ✅ $name: passed"
            else
              echo "[FAIL] $name"
              RESULTS="$RESULTS\n- ❌ $name: failed"
              ALL_PASSED=false
            fi
          }

          run_check "typecheck" "npm run typecheck"
          run_check "lint" "npm run lint"
          run_check "format" "npm run format:check"
          run_check "build" "npm run build"
          run_check "tests" "npm test"

          echo -e "$RESULTS" > check-results.txt

          if [ "$ALL_PASSED" = true ]; then
            echo "all_passed=true" >> $GITHUB_OUTPUT
          else
            echo "all_passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build review prompt
        id: build
        run: |
          PR_NUMBER="${{ steps.pr_info.outputs.pr_number }}"
          BRANCH="${{ steps.pr_info.outputs.branch }}"
          ALL_PASSED="${{ steps.checks.outputs.all_passed }}"

          CHECK_RESULTS=$(cat check-results.txt)
          FAILURE_LOGS=""

          if [ "$ALL_PASSED" != "true" ]; then
            for logfile in /tmp/check-*.log; do
              CHECK_NAME=$(basename "$logfile" .log | sed 's/check-//')
              if [ -f "$logfile" ] && [ "$(wc -l < "$logfile")" -gt 0 ]; then
                FAILURE_LOGS="$FAILURE_LOGS### $CHECK_NAME\n\`\`\`\n$(tail -30 "$logfile")\n\`\`\`\n\n"
              fi
            done
          fi

          TEMPLATE=$(cat .github/prompts/agent4-review-task.md)
          PROMPT=$(echo "$TEMPLATE" | \
            sed "s|{{PR_NUMBER}}|$PR_NUMBER|g" | \
            sed "s|{{BRANCH}}|$BRANCH|g")

          echo "$PROMPT" | \
            awk -v results="$CHECK_RESULTS" '{gsub(/\{\{CHECK_RESULTS\}\}/, results); print}' | \
            awk -v logs="$FAILURE_LOGS" '{gsub(/\{\{FAILURE_LOGS\}\}/, logs); print}' > /tmp/review-prompt-raw.txt

          if [ "$ALL_PASSED" != "true" ]; then
            cat /tmp/review-prompt-raw.txt | sed '/{{^HAS_FAILURES}}/,/{{\/HAS_FAILURES}}/d' | \
              grep -v '{{#HAS_FAILURES}}' | grep -v '{{/HAS_FAILURES}}' > /tmp/review-prompt.txt
          else
            cat /tmp/review-prompt-raw.txt | sed '/{{#HAS_FAILURES}}/,/{{\/HAS_FAILURES}}/d' | \
              grep -v '{{^HAS_FAILURES}}' | grep -v '{{/HAS_FAILURES}}' > /tmp/review-prompt.txt
          fi

          # Fallback to a generic instruction if rendering produced nothing
          if [ ! -s /tmp/review-prompt.txt ]; then
            echo "Review the code changes on this branch vs master. Run all CI checks. Fix any issues. Post review comment on the PR." > /tmp/review-prompt.txt
          fi

          {
            echo "task_prompt<<__EOF_PROMPT__"
            cat /tmp/review-prompt.txt
            echo "__EOF_PROMPT__"
          } >> "$GITHUB_OUTPUT"

      - name: Upload prep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent4-review-prep-${{ github.run_id }}
          path: |
            check-results.txt
          retention-days: 14
          if-no-files-found: ignore

  review:
    name: Run review agent
    needs: prepare
    uses: ./.github/workflows/agent-factory.yml
    secrets: inherit
    with:
      role: quality
      model_tier: small
      task_prompt: ${{ needs.prepare.outputs.task_prompt }}
      title: 'Agent 4: Code Review'
      commit_scope: agent
      commit_changes: false
      timeout_minutes: 15
      branch: ${{ needs.prepare.outputs.branch }}
