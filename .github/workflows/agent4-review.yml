name: "Agent 4: Code Review & QA"

on:
  pull_request:
    types: [opened, synchronize]
    branches: [master]
    paths:
      - 'src/**'
      - 'tests/**'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

concurrency:
  group: agent4-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  AGENT_MODEL: sap-ai-core/anthropic--claude-4.7-opus
  KILO_FLAGS: --auto --variant max
  KILO_RETRIES: '1'

jobs:
  review:
    name: Code Review & QA
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only review PRs from bot branches (auto-implement or auto-fix)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.user.login == 'github-actions[bot]' ||
       contains(github.event.pull_request.head.ref, 'auto/'))

    steps:
      - name: Determine PR info
        id: pr_info
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            BRANCH="${{ github.event.pull_request.head.ref }}"
          else
            PR_NUMBER="${{ inputs.pr_number }}"
            BRANCH=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" --jq '.head.ref')
          fi

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "PR #$PR_NUMBER on branch: $BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr_info.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Kilo CLI and dependencies
        run: |
          npm install -g @kilocode/cli
          npm ci
          echo "[OK] Kilo CLI: $(kilo --version)"


      - name: Run CI checks
        id: checks
        continue-on-error: true
        run: |
          RESULTS=""
          ALL_PASSED=true

          run_check() {
            local name="$1"
            local cmd="$2"
            if eval "$cmd" > /tmp/check-$name.log 2>&1; then
              echo "[PASS] $name"
              RESULTS="$RESULTS\n- ✅ $name: passed"
            else
              echo "[FAIL] $name"
              RESULTS="$RESULTS\n- ❌ $name: failed"
              ALL_PASSED=false
            fi
          }

          run_check "typecheck" "npm run typecheck"
          run_check "lint" "npm run lint"
          run_check "format" "npm run format:check"
          run_check "build" "npm run build"
          run_check "tests" "npm test"

          echo -e "$RESULTS" > check-results.txt

          if [ "$ALL_PASSED" = true ]; then
            echo "all_passed=true" >> $GITHUB_OUTPUT
          else
            echo "all_passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build review prompt
        run: |
          PR_NUMBER="${​{ steps.pr_info.outputs.pr_number }}"
          BRANCH="${​{ steps.pr_info.outputs.branch }}"
          ALL_PASSED="${​{ steps.checks.outputs.all_passed }}"

          # Collect check results and failure logs
          CHECK_RESULTS=$(cat check-results.txt)
          FAILURE_LOGS=""

          if [ "$ALL_PASSED" != "true" ]; then
            for logfile in /tmp/check-*.log; do
              CHECK_NAME=$(basename "$logfile" .log | sed 's/check-//')
              if [ -f "$logfile" ] && [ "$(wc -l < "$logfile")" -gt 0 ]; then
                FAILURE_LOGS="$FAILURE_LOGS### $CHECK_NAME\n\`\`\`\n$(tail -30 "$logfile")\n\`\`\`\n\n"
              fi
            done
          fi

          # Read template and substitute variables
          TEMPLATE=$(cat .github/prompts/agent4-review-task.md)

          PROMPT=$(echo "$TEMPLATE" | \
            sed "s|{​{PR_NUMBER}}|$PR_NUMBER|g" | \
            sed "s|{​{BRANCH}}|$BRANCH|g")

          # Substitute multi-line variables
          echo "$PROMPT" | \
            awk -v results="$CHECK_RESULTS" '{gsub(/\{​\{CHECK_RESULTS\}\}/, results); print}' | \
            awk -v logs="$FAILURE_LOGS" '{gsub(/\{​\{FAILURE_LOGS\}\}/, logs); print}' > /tmp/review-prompt-raw.txt

          # Handle conditional sections based on HAS_FAILURES
          if [ "$ALL_PASSED" != "true" ]; then
            cat /tmp/review-prompt-raw.txt | sed '/{​{^HAS_FAILURES}}/,/{​{\/HAS_FAILURES}}/d' | \
              grep -v '{​{​#HAS_FAILURES}}' | grep -v '{​{/HAS_FAILURES}}' > /tmp/review-prompt.txt
          else
            cat /tmp/review-prompt-raw.txt | sed '/{​{​#HAS_FAILURES}}/,/{​{\/HAS_FAILURES}}/d' | \
              grep -v '{​{^HAS_FAILURES}}' | grep -v '{​{/HAS_FAILURES}}' > /tmp/review-prompt.txt
          fi

          rm -f /tmp/review-prompt-raw.txt

      - name: Run Agent 4 (Review)
        id: review
        continue-on-error: true
        timeout-minutes: 12
        env:
          AICORE_RESOURCE_GROUP: ${{ secrets.AICORE_RESOURCE_GROUP }}
          AICORE_SERVICE_KEY: ${{ secrets.AICORE_SERVICE_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "alexi-bot[bot]"
          git config user.email "alexi-bot[bot]@users.noreply.github.com"

          # Prefer the rendered review prompt built from the template; fall back
          # to a generic instruction if it failed to materialise (the prompt build
          # step uses sed/awk, which has corner cases with binary content in diffs).
          if [ -s /tmp/review-prompt.txt ]; then
            REVIEW_PROMPT=$(cat /tmp/review-prompt.txt)
          else
            REVIEW_PROMPT="Review the code changes on this branch vs master. Run all CI checks. Fix any issues. Post review comment on the PR."
          fi

          attempt=0
          EXIT_CODE=1
          while : ; do
            echo "Running review agent, attempt $((attempt + 1)) ..."
            if kilo run "$REVIEW_PROMPT" --title "Agent 4 Review" \
                $KILO_FLAGS \
                -m "$AGENT_MODEL" \
                > review-output.log 2>&1; then
              EXIT_CODE=0
              break
            fi
            EXIT_CODE=$?
            attempt=$((attempt + 1))
            if [ "$attempt" -gt "${KILO_RETRIES:-0}" ]; then
              break
            fi
            backoff=$((attempt * 30))
            echo "[WARN] Kilo CLI exit $EXIT_CODE — retrying in ${backoff}s ..."
            sleep "$backoff"
          done

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -eq 0 ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi

          tail -50 review-output.log

      - name: Final verification
        id: final_check
        if: always()
        run: |
          echo "Running final CI verification..."
          ALL_PASSED=true

          # Surface failures (don't swallow stderr); ESLint exits non-zero
          # when there are actual errors, which is the only signal we need.
          npm run typecheck || ALL_PASSED=false
          npm run lint || ALL_PASSED=false
          npm run format:check || ALL_PASSED=false
          npm test || ALL_PASSED=false

          if [ "$ALL_PASSED" = true ]; then
            echo "verified=true" >> $GITHUB_OUTPUT
            echo "[OK] All checks pass after review"
          else
            echo "verified=false" >> $GITHUB_OUTPUT
            echo "[WARN] Some checks still failing"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent4-review-${{ github.run_id }}
          path: |
            review-output.log
            check-results.txt
          retention-days: 14
          if-no-files-found: ignore
