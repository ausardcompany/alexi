name: "Agent 3: Auto-Implement"

# Thin caller: delegates each per-issue implementation to the factory
# with role=engineering. Pre-step picks up to 3 open issues and pre-creates
# the feature branch (so the factory has somewhere to push). The factory
# job runs the agent, commits to the feature branch. A post-step then
# verifies CI, opens the PR, and comments back on the issue.

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Specific issue number to implement (skip queue)'
        required: false
        type: number
      dry_run:
        description: 'Dry run — analyze only, do not create branch/PR'
        required: false
        type: boolean
        default: false

concurrency:
  group: auto-implement
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ─── Job 1: Pick up to 3 issues to implement in parallel ─────────────────────
  pick-issues:
    name: Pick Issues
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_issues: ${{ steps.matrix.outputs.has_issues }}
    steps:
      - name: Build issue matrix
        id: matrix
        run: |
          if [ -n "${{ inputs.issue_number }}" ]; then
            ISSUES="[{\"number\":${{ inputs.issue_number }}}]"
          else
            ISSUES=$(gh api "repos/$GITHUB_REPOSITORY/issues?labels=auto-implement&state=open&sort=created&direction=asc&per_page=3" \
              --jq '[.[] | {number: .number, title: .title}]')
          fi

          COUNT=$(echo "$ISSUES" | jq 'length')
          echo "[INFO] Found $COUNT issue(s) to implement"

          if [ "$COUNT" -eq 0 ]; then
            echo "has_issues=false" >> $GITHUB_OUTPUT
            echo 'matrix={"include":[]}' >> $GITHUB_OUTPUT
            exit 0
          fi

          OPEN_PRS=$(gh api "repos/$GITHUB_REPOSITORY/pulls?state=open&per_page=100" --jq '[.[].title]')
          FILTERED="[]"

          while IFS= read -r row; do
            NUM=$(echo "$row" | jq -r '.number')
            HAS_PR=$(echo "$OPEN_PRS" | jq "[.[] | select(contains(\"#${NUM}\"))] | length")
            if [ "${HAS_PR:-0}" -eq 0 ]; then
              FILTERED=$(echo "$FILTERED" | jq --argjson item "$row" '. + [$item]')
            else
              echo "[SKIP] PR already exists for #$NUM"
            fi
          done < <(echo "$ISSUES" | jq -c '.[]')

          FINAL_COUNT=$(echo "$FILTERED" | jq 'length')
          if [ "$FINAL_COUNT" -eq 0 ]; then
            echo "has_issues=false" >> $GITHUB_OUTPUT
            echo 'matrix={"include":[]}' >> $GITHUB_OUTPUT
            echo "[INFO] All issues already have PRs"
            exit 0
          fi

          MATRIX=$(echo "$FILTERED" | jq -c '{include: .}')
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "has_issues=true" >> $GITHUB_OUTPUT
          echo "[OK] Matrix: $MATRIX"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Job 2: Per-issue prepare (branch + prompt) ───────────────────────────────
  prepare:
    name: "Prepare #${{ matrix.number }}"
    needs: pick-issues
    if: needs.pick-issues.outputs.has_issues == 'true' && inputs.dry_run != true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix: ${{ fromJSON(needs.pick-issues.outputs.matrix) }}
      fail-fast: false
    outputs:
      issue_number: ${{ steps.pick.outputs.issue_number }}
      issue_title: ${{ steps.pick.outputs.issue_title }}
      branch_name: ${{ steps.pick.outputs.branch_name }}
      task_prompt: ${{ steps.build.outputs.task_prompt }}
    steps:
      - name: Prepare issue data
        id: pick
        run: |
          ISSUE_NUMBER="${{ matrix.number }}"
          ISSUE_DATA=$(gh api "repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER")

          ISSUE_TITLE=$(echo "$ISSUE_DATA" | jq -r '.title')
          ISSUE_BODY=$(echo "$ISSUE_DATA" | jq -r '.body // ""')
          ISSUE_STATE=$(echo "$ISSUE_DATA" | jq -r '.state')

          if [ "$ISSUE_STATE" != "open" ]; then
            echo "[ERROR] Issue #$ISSUE_NUMBER is not open."
            exit 1
          fi

          SAFE_TITLE=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | head -c 50)
          BRANCH_NAME="auto/${ISSUE_NUMBER}-${SAFE_TITLE}"

          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "issue_title=$ISSUE_TITLE" >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

          echo "$ISSUE_BODY" > /tmp/issue-body.md
          echo "[OK] Issue #$ISSUE_NUMBER: $ISSUE_TITLE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Create feature branch
        run: |
          BRANCH="${{ steps.pick.outputs.branch_name }}"
          git config user.name "kilo-bot[bot]"
          git config user.email "kilo-bot[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "[INFO] Branch $BRANCH already exists."
            git fetch origin "$BRANCH":"$BRANCH" || true
          else
            git checkout -b "$BRANCH"
            git push -u origin "$BRANCH"
            echo "[OK] Created branch: $BRANCH"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Mark issue as in-progress
        run: |
          ISSUE_NUMBER="${{ steps.pick.outputs.issue_number }}"
          gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "in-progress" --remove-label "auto-implement" || true
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "🤖 **Kilo** is starting to implement this feature automatically.

          - **Branch**: \`${{ steps.pick.outputs.branch_name }}\`
          - **Run**: [View workflow](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)

          Implementation in progress..."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build implementation prompt
        id: build
        run: |
          ISSUE_NUMBER="${{ steps.pick.outputs.issue_number }}"
          ISSUE_TITLE="${{ steps.pick.outputs.issue_title }}"
          ISSUE_BODY=""
          if [ -f /tmp/issue-body.md ]; then
            ISSUE_BODY=$(cat /tmp/issue-body.md)
          fi

          TEMPLATE=$(cat .github/prompts/agent3-implement-task.md)

          PROMPT=$(echo "$TEMPLATE" | \
            sed "s|{{ISSUE_NUMBER}}|$ISSUE_NUMBER|g" | \
            sed "s|{{ISSUE_TITLE}}|$ISSUE_TITLE|g")

          echo "$PROMPT" | awk -v body="$ISSUE_BODY" '{gsub(/\{\{ISSUE_BODY\}\}/, body); print}' > /tmp/implement-prompt.txt

          {
            echo "task_prompt<<__EOF_PROMPT__"
            cat /tmp/implement-prompt.txt
            echo "__EOF_PROMPT__"
          } >> "$GITHUB_OUTPUT"

          echo "[OK] Prompt rendered ($(wc -l < /tmp/implement-prompt.txt) lines)"

  # ─── Job 3: Run the engineering agent via the factory ────────────────────────
  implement:
    name: "Implement #${{ needs.prepare.outputs.issue_number }}"
    needs: prepare
    if: needs.prepare.outputs.task_prompt != ''
    uses: ./.github/workflows/agent-factory.yml
    secrets: inherit
    with:
      role: engineering
      task_prompt: ${{ needs.prepare.outputs.task_prompt }}
      title: "Agent 3: Implement #${{ needs.prepare.outputs.issue_number }}"
      commit_scope: agent
      commit_changes: true
      timeout_minutes: 22
      branch: ${{ needs.prepare.outputs.branch_name }}

  # ─── Job 4: Post-implementation verify + open PR + comment back ──────────────
  followup:
    name: "Followup #${{ needs.prepare.outputs.issue_number }}"
    needs: [prepare, implement]
    if: always() && needs.prepare.outputs.task_prompt != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.branch_name }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify implementation
        id: verify
        continue-on-error: true
        run: |
          ALL_PASSED=true
          RESULTS=""

          run_check() {
            local name="$1"
            local cmd="$2"
            echo "--- Verifying: $name ---"
            if eval "$cmd" > /tmp/check.log 2>&1; then
              echo "[PASS] $name"
              RESULTS="$RESULTS\n- ✅ $name"
            else
              echo "[FAIL] $name"
              tail -15 /tmp/check.log
              RESULTS="$RESULTS\n- ❌ $name"
              ALL_PASSED=false
            fi
          }

          run_check "typecheck" "npm run typecheck"
          run_check "lint" "npm run lint"
          run_check "format" "npm run format:check"
          run_check "build" "npm run build"
          run_check "tests" "npm test"

          echo -e "$RESULTS" > verify-results.txt

          if [ "$ALL_PASSED" = true ]; then
            echo "verified=true" >> $GITHUB_OUTPUT
          else
            echo "verified=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect changes vs master
        id: changes
        run: |
          CHANGES=$(git rev-list --count origin/master..HEAD || echo "0")
          if [ "$CHANGES" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            CHANGES_COUNT=$(git diff --name-only origin/master..HEAD | wc -l | tr -d ' ')
            echo "changes_count=$CHANGES_COUNT" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "changes_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Auto-close issue if no changes
        if: steps.changes.outputs.has_changes == 'false' && needs.implement.result == 'success'
        run: |
          ISSUE_NUMBER="${{ needs.prepare.outputs.issue_number }}"
          gh issue close "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --comment "Auto-closed: implementation produced no changes on the feature branch. No code changes were needed." 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        id: pr
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          ISSUE_NUMBER="${{ needs.prepare.outputs.issue_number }}"
          ISSUE_TITLE="${{ needs.prepare.outputs.issue_title }}"
          BRANCH="${{ needs.prepare.outputs.branch_name }}"
          VERIFIED="${{ steps.verify.outputs.verified }}"
          CHANGES_COUNT="${{ steps.changes.outputs.changes_count }}"

          VERIFY_RESULTS=""
          if [ -f verify-results.txt ]; then
            VERIFY_RESULTS=$(cat verify-results.txt)
          fi

          if [ "$VERIFIED" = "true" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="All checks pass"
          else
            STATUS_EMOJI="⚠️"
            STATUS_TEXT="Some checks need attention"
          fi

          cat > /tmp/pr-body.md <<PRBODY
          ## Summary

          Automated implementation of #${ISSUE_NUMBER} by **Kilo CLI** via the agent factory (role=engineering).

          ## Checks ${STATUS_EMOJI}

          ${STATUS_TEXT}

          ${VERIFY_RESULTS}

          ## Changes

          - **Files changed**: ${CHANGES_COUNT}
          - **Branch**: \`${BRANCH}\`

          ## Review Checklist

          - [ ] Code changes match the issue requirements
          - [ ] Tests cover the new functionality
          - [ ] No unintended side effects
          - [ ] Documentation updated if needed

          ---
          Implemented by [Kilo CLI](https://kilo.ai) with SAP AI Core · Closes #${ISSUE_NUMBER}
          PRBODY

          gh label create "auto-implemented" --repo "$GITHUB_REPOSITORY" --description "PR created by auto-implement workflow" --color "1d76db" 2>/dev/null || true

          PR_URL=$(gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --title "feat: ${ISSUE_TITLE} (#${ISSUE_NUMBER})" \
            --body-file /tmp/pr-body.md \
            --base master \
            --head "$BRANCH" \
            --label "auto-implemented" \
            2>&1) || true

          if [ -n "$PR_URL" ] && echo "$PR_URL" | grep -q "^https://"; then
            echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            echo "[OK] PR created: $PR_URL"
          else
            echo "[WARN] PR creation failed: $PR_URL"
            PR_URL=$(gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --title "feat: ${ISSUE_TITLE} (#${ISSUE_NUMBER})" \
              --body-file /tmp/pr-body.md \
              --base master \
              --head "$BRANCH" \
              2>&1) || true
            if [ -n "$PR_URL" ] && echo "$PR_URL" | grep -q "^https://"; then
              echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
              echo "[OK] PR created (without label): $PR_URL"
            else
              echo "[ERROR] PR creation failed entirely: $PR_URL"
              echo "pr_url=" >> $GITHUB_OUTPUT
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Update issue with results
        if: always()
        run: |
          ISSUE_NUMBER="${{ needs.prepare.outputs.issue_number }}"
          IMPLEMENT_RESULT="${{ needs.implement.result }}"
          VERIFIED="${{ steps.verify.outputs.verified }}"
          PR_URL="${{ steps.pr.outputs.pr_url }}"
          HAS_CHANGES="${{ steps.changes.outputs.has_changes }}"

          if [ "$HAS_CHANGES" = "true" ] && [ -n "$PR_URL" ]; then
            if [ "$VERIFIED" = "true" ]; then
              COMMENT="✅ **Kilo** has successfully implemented this feature!

          **Pull Request**: ${PR_URL}

          All checks pass. Please review and merge."
            else
              COMMENT="⚠️ **Kilo** has implemented this feature but some checks need attention.

          **Pull Request**: ${PR_URL}

          Please review the PR — some checks may need manual fixes."
            fi
          elif [ "$IMPLEMENT_RESULT" != "success" ]; then
            COMMENT="❌ **Kilo** was unable to implement this feature automatically.

          The AI agent encountered issues during implementation.
          Manual implementation may be required.

          [View workflow run](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)"

            gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "auto-implement" --remove-label "in-progress" || true
          else
            COMMENT="ℹ️ **Kilo** analyzed this feature but produced no code changes.

          This may mean the feature requires manual implementation or the issue description needs more detail.

          [View workflow run](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)"

            gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "auto-implement" --remove-label "in-progress" || true
          fi

          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$COMMENT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-implement-followup-${{ needs.prepare.outputs.issue_number }}-${{ github.run_id }}
          path: |
            verify-results.txt
          retention-days: 14
          if-no-files-found: ignore
