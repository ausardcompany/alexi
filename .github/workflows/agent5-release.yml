name: "Agent 5: Release Management"

# Thin caller: delegates the release agent run to the factory with
# role=infrastructure. The prepare job decides whether a release is
# warranted (commit count, version bump detection, CI gate) and renders
# the release prompt with the commit log + new version. If the gate
# fails the factory job is skipped via `needs.prepare.outputs.should_run`.

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: false
        type: choice
        options:
          - auto
          - patch
          - minor
        default: auto
      dry_run:
        description: 'Dry run — show what would be released'
        required: false
        type: boolean
        default: false
  schedule:
    # Run weekly on Monday at 10:00 UTC (only if there are unreleased changes)
    - cron: '0 10 * * 1'

concurrency:
  group: agent5-release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Gate and build release prompt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      task_prompt: ${{ steps.build.outputs.task_prompt }}
      new_version: ${{ steps.version.outputs.new }}
      current_version: ${{ steps.version.outputs.current }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check if release needed
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG=$(git rev-list --max-parents=0 HEAD | head -1)
            echo "is_first=true" >> $GITHUB_OUTPUT
          else
            echo "is_first=false" >> $GITHUB_OUTPUT
          fi

          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

          COMMIT_COUNT=$(git log ${LAST_TAG}..HEAD --oneline --no-merges | wc -l | tr -d ' ')
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "[INFO] Commits since $LAST_TAG: $COMMIT_COUNT"

          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "[SKIP] No new commits since last release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            HAS_FEAT=$(git log ${LAST_TAG}..HEAD --format="%s" --no-merges | grep -c "^feat" || echo "0")
            HAS_BREAKING=$(git log ${LAST_TAG}..HEAD --format="%s" --no-merges | grep -c "BREAKING" || echo "0")
            if [ "$HAS_BREAKING" -gt 0 ]; then
              echo "auto_bump=major" >> $GITHUB_OUTPUT
            elif [ "$HAS_FEAT" -gt 0 ]; then
              echo "auto_bump=minor" >> $GITHUB_OUTPUT
            else
              echo "auto_bump=patch" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run CI checks
        if: steps.check.outputs.should_release == 'true'
        id: ci
        continue-on-error: true
        run: |
          set +e
          npm run typecheck \
            && npm run lint \
            && npm run format:check \
            && npm run build \
            && npm test
          STATUS=$?

          if [ "$STATUS" -eq 0 ]; then
            echo "ci_passed=true" >> $GITHUB_OUTPUT
            echo "[OK] All CI checks pass"
          else
            echo "ci_passed=false" >> $GITHUB_OUTPUT
            echo "[FAIL] CI checks failed (status $STATUS) — cannot release"
          fi
          exit 0

      - name: Determine version
        if: steps.check.outputs.should_release == 'true' && steps.ci.outputs.ci_passed == 'true'
        id: version
        run: |
          BUMP="${{ inputs.version_bump || 'auto' }}"
          if [ "$BUMP" = "auto" ]; then
            BUMP="${{ steps.check.outputs.auto_bump }}"
          fi

          if [ "$BUMP" = "major" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "[WARN] Major bump on schedule. Downgrading to minor."
            BUMP="minor"
          fi

          CURRENT_VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
          esac

          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "[OK] Version: $CURRENT_VERSION -> $NEW_VERSION ($BUMP)"

      - name: Gate decision
        id: gate
        run: |
          if [ "${{ steps.check.outputs.should_release }}" = "true" ] && \
             [ "${{ steps.ci.outputs.ci_passed }}" = "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Build release prompt
        if: steps.gate.outputs.should_run == 'true'
        id: build
        run: |
          LAST_TAG="${{ steps.check.outputs.last_tag }}"
          NEW_VERSION="${{ steps.version.outputs.new }}"
          BUMP_TYPE="${{ steps.version.outputs.bump }}"
          DRY_RUN="${{ inputs.dry_run || 'false' }}"

          COMMIT_LOG=$(git log ${LAST_TAG}..HEAD --format="- %s (%h)" --no-merges)

          TEMPLATE=$(cat .github/prompts/agent5-release-task.md)
          PROMPT=$(echo "$TEMPLATE" | \
            sed "s|{{LAST_TAG}}|$LAST_TAG|g" | \
            sed "s|{{NEW_VERSION}}|$NEW_VERSION|g" | \
            sed "s|{{BUMP_TYPE}}|$BUMP_TYPE|g" | \
            sed "s|{{DRY_RUN}}|$DRY_RUN|g")

          echo "$PROMPT" | awk -v commitlog="$COMMIT_LOG" '{gsub(/\{\{COMMIT_LOG\}\}/, commitlog); print}' > /tmp/release-prompt-raw.txt

          if [ "$DRY_RUN" = "true" ]; then
            cat /tmp/release-prompt-raw.txt | sed '/{{^DRY_RUN}}/,/{{\/DRY_RUN}}/d' | \
              grep -v '{{#DRY_RUN}}' | grep -v '{{/DRY_RUN}}' > /tmp/release-prompt.txt
          else
            cat /tmp/release-prompt-raw.txt | sed '/{{#DRY_RUN}}/,/{{\/DRY_RUN}}/d' | \
              grep -v '{{^DRY_RUN}}' | grep -v '{{/DRY_RUN}}' > /tmp/release-prompt.txt
          fi

          {
            echo "task_prompt<<__EOF_PROMPT__"
            cat /tmp/release-prompt.txt
            echo "__EOF_PROMPT__"
          } >> "$GITHUB_OUTPUT"
          echo "[OK] Release prompt rendered"

      - name: Summary (skipped path)
        if: steps.gate.outputs.should_run != 'true'
        run: |
          echo "## Agent 5 Release — skipped"
          echo "- Should release: ${{ steps.check.outputs.should_release }}"
          echo "- CI passed: ${{ steps.ci.outputs.ci_passed || 'n/a' }}"

  release:
    name: Run release agent
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    uses: ./.github/workflows/agent-factory.yml
    secrets: inherit
    with:
      role: infrastructure
      model_tier: small
      task_prompt: ${{ needs.prepare.outputs.task_prompt }}
      title: 'Agent 5: Release'
      commit_scope: ci
      commit_changes: true
      timeout_minutes: 12
      branch: master

  summary:
    name: Summary
    needs: [prepare, release]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Print summary
        run: |
          echo "## Agent 5 Release Summary"
          echo "- Should run: ${{ needs.prepare.outputs.should_run }}"
          echo "- Version: ${{ needs.prepare.outputs.current_version || '?' }} -> ${{ needs.prepare.outputs.new_version || '?' }}"
          echo "- Result: ${{ needs.release.result || 'skipped' }}"
