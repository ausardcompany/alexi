name: "Agent 5: Release Management"

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: false
        type: choice
        options:
          - auto
          - patch
          - minor
        default: auto
      dry_run:
        description: 'Dry run — show what would be released'
        required: false
        type: boolean
        default: false
  schedule:
    # Run weekly on Monday at 10:00 UTC (only if there are unreleased changes)
    - cron: '0 10 * * 1'

concurrency:
  group: agent5-release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Prepare Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Kilo CLI and dependencies
        run: |
          npm install -g @kilocode/cli
          npm ci
          echo "[OK] Kilo CLI version: $(kilo --version)"

      - name: Check if release needed
        id: check
        run: |
          # Get last release tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            echo "[INFO] No previous tags found. First release."
            LAST_TAG=$(git rev-list --max-parents=0 HEAD | head -1)
            echo "is_first=true" >> $GITHUB_OUTPUT
          else
            echo "is_first=false" >> $GITHUB_OUTPUT
          fi

          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

          # Count commits since last tag
          COMMIT_COUNT=$(git log ${LAST_TAG}..HEAD --oneline --no-merges | wc -l | tr -d ' ')
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "[INFO] Commits since $LAST_TAG: $COMMIT_COUNT"

          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "[SKIP] No new commits since last release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT

            # Auto-detect version bump
            HAS_FEAT=$(git log ${LAST_TAG}..HEAD --format="%s" --no-merges | grep -c "^feat" || echo "0")
            HAS_BREAKING=$(git log ${LAST_TAG}..HEAD --format="%s" --no-merges | grep -c "BREAKING" || echo "0")

            if [ "$HAS_BREAKING" -gt 0 ]; then
              echo "auto_bump=major" >> $GITHUB_OUTPUT
            elif [ "$HAS_FEAT" -gt 0 ]; then
              echo "auto_bump=minor" >> $GITHUB_OUTPUT
            else
              echo "auto_bump=patch" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run CI checks
        if: steps.check.outputs.should_release == 'true'
        id: ci
        run: |
          echo "Running full CI check before release..."

          npm run typecheck && \
          npm run lint && \
          npm run format:check && \
          npm run build && \
          npm test

          if [ $? -eq 0 ]; then
            echo "ci_passed=true" >> $GITHUB_OUTPUT
            echo "[OK] All CI checks pass"
          else
            echo "ci_passed=false" >> $GITHUB_OUTPUT
            echo "[FAIL] CI checks failed — cannot release"
          fi

      - name: Determine version
        if: steps.check.outputs.should_release == 'true' && steps.ci.outputs.ci_passed == 'true'
        id: version
        run: |
          BUMP="${{ inputs.version_bump || 'auto' }}"
          if [ "$BUMP" = "auto" ]; then
            BUMP="${{ steps.check.outputs.auto_bump }}"
          fi

          # Block major without explicit manual trigger
          if [ "$BUMP" = "major" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "[WARN] Major version bump detected but running on schedule. Downgrading to minor."
            BUMP="minor"
          fi

          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "bump=$BUMP" >> $GITHUB_OUTPUT

          # Calculate new version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
          esac

          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "[OK] Version: $CURRENT_VERSION → $NEW_VERSION ($BUMP)"

      - name: Build release prompt
        if: steps.check.outputs.should_release == 'true' && steps.ci.outputs.ci_passed == 'true'
        run: |
          LAST_TAG="${{ steps.check.outputs.last_tag }}"
          NEW_VERSION="${{ steps.version.outputs.new }}"
          DRY_RUN="${{ inputs.dry_run || 'false' }}"

          {
            echo "# Release Task — v$NEW_VERSION"
            echo ""
            echo "## Context"
            echo ""
            echo "- Last tag: $LAST_TAG"
            echo "- New version: $NEW_VERSION"
            echo "- Dry run: $DRY_RUN"
            echo ""
            echo "## Commits to include"
            echo ""
            echo '```'
            git log ${LAST_TAG}..HEAD --format="- %s (%h)" --no-merges
            echo '```'
            echo ""
            echo "## Instructions"
            echo ""
            echo "1. Generate CHANGELOG entry for v$NEW_VERSION"
            echo "   - Categorize commits (Features, Bug Fixes, Maintenance, Dependencies)"
            echo "   - Prepend to CHANGELOG.md"
            echo ""

            if [ "$DRY_RUN" = "true" ]; then
              echo "2. **DRY RUN** — only write the CHANGELOG. Do NOT bump version or create tags."
              echo "   Save proposed release notes to /tmp/release-notes.md"
            else
              echo "2. Update version:"
              echo "   - Run: \`npm version $NEW_VERSION --no-git-tag-version\`"
              echo ""
              echo "3. Commit and tag:"
              echo '   ```bash'
              echo "   git add package.json package-lock.json CHANGELOG.md"
              echo "   git commit -m \"chore(release): v$NEW_VERSION\""
              echo "   git tag -a \"v$NEW_VERSION\" -m \"Release v$NEW_VERSION\""
              echo "   git push origin master --tags"
              echo '   ```'
              echo ""
              echo "4. Create GitHub release:"
              echo "   - Write release notes to /tmp/release-notes.md"
              echo "   - Run: \`gh release create \"v$NEW_VERSION\" --title \"v$NEW_VERSION\" --notes-file /tmp/release-notes.md\`"
            fi
          } > /tmp/release-prompt.txt

          echo "[OK] Release prompt built"

      - name: Run Agent 5 (Release)
        id: release
        if: steps.check.outputs.should_release == 'true' && steps.ci.outputs.ci_passed == 'true'
        continue-on-error: true
        timeout-minutes: 8
        env:
          AICORE_RESOURCE_GROUP: ${{ secrets.AICORE_RESOURCE_GROUP }}
          AICORE_SERVICE_KEY: ${{ secrets.AICORE_SERVICE_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "alexi-bot[bot]"
          git config user.email "alexi-bot[bot]@users.noreply.github.com"

          PROMPT=$(cat /tmp/release-prompt.txt)

          kilo run "$PROMPT" \
            --auto \
            -m "sap-ai-core/anthropic--claude-4.6-opus" \
            --variant max \
            --system-prompt "$(cat .github/prompts/agent5-release-system.md)" \
            > release-output.log 2>&1

          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -eq 0 ]; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "[OK] Release completed"
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "[WARN] Release failed with exit code $EXIT_CODE"
          fi

          tail -50 release-output.log

      - name: Summary
        if: always()
        run: |
          echo "## Agent 5 Release Summary"
          echo ""
          echo "- Should release: ${{ steps.check.outputs.should_release }}"
          echo "- CI passed: ${{ steps.ci.outputs.ci_passed || 'n/a' }}"
          echo "- Version: ${{ steps.version.outputs.current || '?' }} → ${{ steps.version.outputs.new || '?' }}"
          echo "- Success: ${{ steps.release.outputs.success || 'skipped' }}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent5-release-${{ github.run_id }}
          path: |
            release-output.log
          retention-days: 14
          if-no-files-found: ignore
