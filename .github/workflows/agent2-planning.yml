name: "Agent 2: Planning & Issues"

# Thin caller: delegates the planning agent run to the factory with
# role=product. The prepare job finds the latest research file, checks
# the existing-issues backlog gate, and renders a single comprehensive
# task that asks for plan -> tasks -> issues in one run (the original
# workflow ran 3 sequential `kilo run` calls — collapsed into one here).

on:
  workflow_run:
    workflows:
      - "Agent 1: Research & Trends"
    types: [completed]
  schedule:
    # Run daily at 06:00 UTC (after research at 04:00)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      max_issues:
        description: 'Maximum issues to create'
        required: false
        type: number
        default: 5
      dry_run:
        description: 'Dry run — plan only, no issues'
        required: false
        type: boolean
        default: false

concurrency:
  group: agent2-planning
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  prepare:
    name: Find research and gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      task_prompt: ${{ steps.build.outputs.task_prompt }}
      open_count: ${{ steps.existing.outputs.open_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Find latest research
        id: research
        run: |
          LATEST=$(ls -1 .github/research/*-research.md 2>/dev/null | sort | tail -1 || echo "")
          if [ -z "$LATEST" ]; then
            echo "[WARN] No research files found"
            echo "has_research=false" >> $GITHUB_OUTPUT
          else
            echo "has_research=true" >> $GITHUB_OUTPUT
            echo "file=$LATEST" >> $GITHUB_OUTPUT
            echo "[OK] Latest research: $LATEST"
          fi

      - name: Check existing issues
        id: existing
        run: |
          OPEN_COUNT=$(gh issue list --repo "$GITHUB_REPOSITORY" --label "auto-implement" --state open --json number --jq 'length')
          echo "open_count=$OPEN_COUNT" >> $GITHUB_OUTPUT
          echo "[INFO] Open auto-implement issues: $OPEN_COUNT"

          if [ "$OPEN_COUNT" -ge 10 ]; then
            echo "should_skip=true" >> $GITHUB_OUTPUT
            echo "[SKIP] Too many open issues ($OPEN_COUNT >= 10). Skipping."
          else
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Gate decision
        id: gate
        run: |
          if [ "${{ steps.research.outputs.has_research }}" = "true" ] && \
             [ "${{ steps.existing.outputs.should_skip }}" != "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Build planning prompt
        if: steps.gate.outputs.should_run == 'true'
        id: build
        run: |
          RESEARCH_FILE="${{ steps.research.outputs.file }}"
          MAX_ISSUES="${{ inputs.max_issues || '5' }}"
          DRY_RUN="${{ inputs.dry_run || 'false' }}"
          OPEN_COUNT="${{ steps.existing.outputs.open_count }}"
          TODAY=$(date -u +%Y-%m-%d)

          TEMPLATE=$(cat .github/prompts/agent2-planning-task.md)

          PROMPT=$(echo "$TEMPLATE" | \
            sed "s|{{RESEARCH_FILE}}|$RESEARCH_FILE|g" | \
            sed "s|{{MAX_ISSUES}}|$MAX_ISSUES|g" | \
            sed "s|{{DRY_RUN}}|$DRY_RUN|g" | \
            sed "s|{{OPEN_COUNT}}|$OPEN_COUNT|g" | \
            sed "s|{{DATE}}|$TODAY|g")

          if [ "$DRY_RUN" = "true" ]; then
            RENDERED=$(echo "$PROMPT" | sed '/{{^DRY_RUN}}/,/{{\/DRY_RUN}}/d' | \
              grep -v '{{#DRY_RUN}}' | grep -v '{{/DRY_RUN}}')
          else
            RENDERED=$(echo "$PROMPT" | sed '/{{#DRY_RUN}}/,/{{\/DRY_RUN}}/d' | \
              grep -v '{{^DRY_RUN}}' | grep -v '{{/DRY_RUN}}')
          fi

          # Collapse the original 3-step sequence (plan -> tasks -> issues)
          # into a single comprehensive instruction block.
          {
            echo "$RENDERED"
            echo ""
            echo "## Workflow (do all three stages in this single run)"
            echo ""
            echo "1. **Plan** — produce the development plan derived from $RESEARCH_FILE."
            echo "2. **Tasks** — break the plan into implementable tasks and save the breakdown to tasks.md."
            echo "3. **Issues** — for each task, create a GitHub issue using"
            echo "   \`gh issue create --repo \"\$GITHUB_REPOSITORY\" --label auto-implement\`."
            echo "   Cap at $MAX_ISSUES new issues."
            if [ "$DRY_RUN" = "true" ]; then
              echo ""
              echo "**DRY RUN**: skip step 3 — do not call \`gh issue create\`."
            fi
          } > /tmp/planning-prompt.txt

          {
            echo "task_prompt<<__EOF_PROMPT__"
            cat /tmp/planning-prompt.txt
            echo "__EOF_PROMPT__"
          } >> "$GITHUB_OUTPUT"

          echo "[OK] Planning prompt rendered"

  plan:
    name: Run planning agent
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    uses: ./.github/workflows/agent-factory.yml
    secrets: inherit
    with:
      role: product
      task_prompt: ${{ needs.prepare.outputs.task_prompt }}
      title: 'Agent 2: Planning & Issues'
      commit_scope: ci
      commit_changes: true
      timeout_minutes: 18
      branch: master

  report:
    name: Report results
    needs: [prepare, plan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Agent 2 Summary"
          echo "- Should run: ${{ needs.prepare.outputs.should_run }}"
          echo "- Open issues before: ${{ needs.prepare.outputs.open_count }}"
          NEW_ISSUES=$(gh issue list --repo "$GITHUB_REPOSITORY" --label "auto-implement" --state open --json number --jq 'length' 2>/dev/null || echo "?")
          echo "- Open issues after: $NEW_ISSUES"
          echo "- Plan result: ${{ needs.plan.result || 'skipped' }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
