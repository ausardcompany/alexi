name: "Agent 2: Planning & Issues"

on:
  workflow_run:
    workflows:
      - "Agent 1: Research & Trends"
    types: [completed]
  schedule:
    # Run daily at 06:00 UTC (after research at 04:00)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      max_issues:
        description: 'Maximum issues to create'
        required: false
        type: number
        default: 5
      dry_run:
        description: 'Dry run — plan only, no issues'
        required: false
        type: boolean
        default: false

concurrency:
  group: agent2-planning
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  plan:
    name: Create Development Plan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Kilo CLI and dependencies
        run: |
          npm install -g @kilocode/cli
          npm ci
          npm ci
          echo "[OK] Kilo CLI: $(kilo --version)"


      - name: Find latest research
        id: research
        run: |
          LATEST=$(ls -1 .github/research/*-research.md 2>/dev/null | sort | tail -1 || echo "")
          if [ -z "$LATEST" ]; then
            echo "[WARN] No research files found"
            echo "has_research=false" >> $GITHUB_OUTPUT
          else
            echo "has_research=true" >> $GITHUB_OUTPUT
            echo "file=$LATEST" >> $GITHUB_OUTPUT
            echo "[OK] Latest research: $LATEST"
          fi

      - name: Check existing issues
        id: existing
        run: |
          # Count open auto-implement issues
          OPEN_COUNT=$(gh issue list --label "auto-implement" --state open --json number --jq 'length')
          echo "open_count=$OPEN_COUNT" >> $GITHUB_OUTPUT
          echo "[INFO] Open auto-implement issues: $OPEN_COUNT"

          # If too many open, skip creating new ones
          if [ "$OPEN_COUNT" -ge 10 ]; then
            echo "should_skip=true" >> $GITHUB_OUTPUT
            echo "[SKIP] Too many open issues ($OPEN_COUNT >= 10). Skipping."
          else
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build planning prompt
        if: steps.research.outputs.has_research == 'true' && steps.existing.outputs.should_skip != 'true'
        run: |
          RESEARCH_FILE="${{ steps.research.outputs.file }}"
          MAX_ISSUES="${{ inputs.max_issues || '5' }}"
          DRY_RUN="${{ inputs.dry_run || 'false' }}"
          OPEN_COUNT="${{ steps.existing.outputs.open_count }}"

          {
            echo "# Planning Task"
            echo ""
            echo "## Research Input"
            echo ""
            echo "Read the latest research report at: \`$RESEARCH_FILE\`"
            echo ""
            echo "## Current State"
            echo ""
            echo "- Open auto-implement issues: $OPEN_COUNT"
            echo "- Maximum new issues to create: $MAX_ISSUES"
            echo "- Dry run: $DRY_RUN"
            echo ""
            echo "## Instructions"
            echo ""
            echo "1. Read the research file above"
            echo "2. Explore the current codebase (src/, tests/) to understand what exists"
            echo "3. Create a development plan saved to \`.github/research/$(date -u +%Y-%m-%d)-plan.md\`"
            echo "4. Create GitHub issues for the top $MAX_ISSUES actionable tasks"
            echo ""
            if [ "$DRY_RUN" = "true" ]; then
              echo "**DRY RUN MODE**: Only write the plan file. Do NOT create GitHub issues."
            else
              echo "Create issues using: \`gh issue create --title \"...\" --label \"auto-implement,enhancement,...\" --body-file /tmp/issue-N.md\`"
              echo ""
              echo "Important rules for issue creation:"
              echo "- Check if similar issues already exist: \`gh issue list --label auto-implement --state open\`"
              echo "- Only categories: tool, provider, command, mcp, hook, skill, config"
              echo "- Each issue MUST be self-contained with full implementation guide"
              echo "- Include acceptance criteria and files to modify"
              echo "- Write issue body to a temp file first, then use --body-file"
            fi
            echo ""
            echo "Follow the format from .github/prompts/agent2-planning-system.md"
          } > /tmp/planning-prompt.txt

          echo "[OK] Planning prompt built"

      - name: Run Agent 2 (Planning)
        id: planning
        if: steps.research.outputs.has_research == 'true' && steps.existing.outputs.should_skip != 'true'
        continue-on-error: true
        timeout-minutes: 12
        env:
          AICORE_RESOURCE_GROUP: ${{ secrets.AICORE_RESOURCE_GROUP }}
          AICORE_SERVICE_KEY: ${{ secrets.AICORE_SERVICE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TASK_PROMPT=$(cat /tmp/planning-prompt.txt)

          # Run plan + tasks + issues in sequence via speckit
          kilo run "$TASK_PROMPT" --title "Agent 2 Planning" \
            --auto \
            -m "sap-ai-core/anthropic--claude-4.6-opus" \
            --variant max \
            > planning-output.log 2>&1

          kilo run "Break the plan into implementable tasks and save to tasks.md" --title "Agent 2 Tasks" \
            --auto \
            -m "sap-ai-core/anthropic--claude-4.6-opus" \
            --variant max \
            >> planning-output.log 2>&1

          kilo run "Create GitHub issues from tasks.md using gh issue create" --title "Agent 2 Issues" \
            --auto \
            -m "sap-ai-core/anthropic--claude-4.6-opus" \
            --variant max \
            >> planning-output.log 2>&1

          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -eq 0 ]; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "[OK] Planning completed"
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "[WARN] Planning failed with exit code $EXIT_CODE"
          fi

          echo "=== Output (last 50 lines) ==="
          tail -50 planning-output.log

      - name: Commit plan
        if: steps.planning.outputs.success == 'true'
        run: |
          git config user.name "alexi-bot[bot]"
          git config user.email "alexi-bot[bot]@users.noreply.github.com"

          git add .github/research/ 2>/dev/null || true

          if ! git diff --cached --quiet; then
            git commit -m "plan: development roadmap $(date -u +%Y-%m-%d) [alexi-bot]" --no-verify
            git push origin master
            echo "[OK] Plan committed"
          else
            echo "[INFO] No plan changes to commit"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Report results
        if: always()
        run: |
          echo "## Agent 2 Summary"
          echo ""
          echo "- Research available: ${{ steps.research.outputs.has_research }}"
          echo "- Open issues before: ${{ steps.existing.outputs.open_count }}"
          echo "- Planning success: ${{ steps.planning.outputs.success || 'skipped' }}"

          # Count new issues created
          NEW_ISSUES=$(gh issue list --label "auto-implement" --state open --json number --jq 'length' 2>/dev/null || echo "?")
          echo "- Open issues after: $NEW_ISSUES"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent2-planning-${{ github.run_id }}
          path: |
            planning-output.log
          retention-days: 14
          if-no-files-found: ignore
