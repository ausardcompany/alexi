name: "Agent 1: Research & Trends"

# Thin caller: delegates the agent run to the reusable factory at
# .github/workflows/agent-factory.yml with role=consulting.
# The prepare job renders the per-run context (date, focus, last research
# file) and emits the fully-rendered task prompt as an output, which the
# factory consumes via its inline `task_prompt` input.

on:
  schedule:
    # Run daily at 04:00 UTC (before planning at 06:00)
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      focus_area:
        description: 'Focus area (tools, agents, mcp, dx, all)'
        required: false
        type: choice
        options:
          - all
          - tools
          - agents
          - mcp
          - dx
          - performance
        default: all

concurrency:
  group: agent1-research
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Prepare research context
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      task_prompt: ${{ steps.build.outputs.task_prompt }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build research prompt
        id: build
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          FOCUS="${{ inputs.focus_area || 'all' }}"

          mkdir -p .github/research
          LAST_RESEARCH=$(ls -1 .github/research/*-research.md 2>/dev/null | sort | tail -1 || echo "")

          TEMPLATE=$(cat .github/prompts/agent1-research-task.md)

          PROMPT=$(echo "$TEMPLATE" | \
            sed "s|{{DATE}}|$TODAY|g" | \
            sed "s|{{FOCUS}}|$FOCUS|g" | \
            sed "s|{{LAST_RESEARCH}}|$LAST_RESEARCH|g")

          if [ -n "$LAST_RESEARCH" ]; then
            RENDERED=$(echo "$PROMPT" | grep -v '{{#LAST_RESEARCH}}' | grep -v '{{/LAST_RESEARCH}}')
          else
            RENDERED=$(echo "$PROMPT" | sed '/{{#LAST_RESEARCH}}/,/{{\/LAST_RESEARCH}}/d')
          fi

          # Multi-line outputs use the heredoc form
          {
            echo "task_prompt<<__EOF_PROMPT__"
            echo "$RENDERED"
            echo "__EOF_PROMPT__"
          } >> "$GITHUB_OUTPUT"

          echo "[OK] Research prompt rendered ($(echo "$RENDERED" | wc -l) lines)"

  research:
    name: Run research agent
    needs: prepare
    uses: ./.github/workflows/agent-factory.yml
    secrets: inherit
    with:
      role: consulting
      model_tier: small
      task_prompt: ${{ needs.prepare.outputs.task_prompt }}
      title: 'Agent 1: Research & Trends'
      commit_scope: ci
      commit_changes: true
      timeout_minutes: 20
      branch: master
