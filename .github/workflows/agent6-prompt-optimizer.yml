name: "Agent 6: Prompt Improver"

# Thin caller: delegates the prompt-optimizer agent run to the factory
# with role=management. The prepare job collects agent performance metrics
# from recent workflow runs and renders the optimizer task prompt.

on:
  schedule:
    # Run weekly on Wednesday at 08:00 UTC
    - cron: '0 8 * * 3'
  workflow_dispatch:
    inputs:
      target_agent:
        description: 'Which agent prompts to optimize (all or specific)'
        required: false
        type: choice
        options:
          - all
          - agent1-research
          - agent2-planning
          - agent3-implement
          - agent4-review
          - agent5-release
          - agent-autohealing
        default: all
      dry_run:
        description: 'Dry run — analyze and report only, do not modify prompts'
        required: false
        type: boolean
        default: false

concurrency:
  group: agent6-prompt-optimizer
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  prepare:
    name: Collect metrics and build prompt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      task_prompt: ${{ steps.build.outputs.task_prompt }}
      file_count: ${{ steps.targets.outputs.file_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Collect agent performance metrics
        id: metrics
        run: |
          METRICS=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs?created=>=$(date -u -d '14 days ago' +%Y-%m-%dT00:00:00Z 2>/dev/null || date -u -v-14d +%Y-%m-%dT00:00:00Z)&per_page=100" \
            --jq '[.workflow_runs[] | {name: .name, conclusion: .conclusion}] | group_by(.name) | map({
              name: .[0].name,
              total: length,
              success: ([.[] | select(.conclusion == "success")] | length),
              failure: ([.[] | select(.conclusion == "failure")] | length)
            }) | sort_by(-.failure)')

          echo "$METRICS" > /tmp/agent-metrics.json
          echo "[OK] Metrics collected"
          echo "$METRICS" | jq -r '.[] | select(.failure > 0) | "\(.name): \(.failure)/\(.total) failures"'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine target prompts
        id: targets
        run: |
          TARGET="${{ inputs.target_agent || 'all' }}"

          if [ "$TARGET" = "all" ]; then
            PROMPT_FILES=$(ls .github/prompts/agent*-system.md .github/prompts/agent*-task.md 2>/dev/null | sort)
          else
            PROMPT_FILES=$(ls .github/prompts/${TARGET}*.md 2>/dev/null | sort)
          fi

          if [ -z "$PROMPT_FILES" ]; then
            echo "[ERROR] No prompt files found for target: $TARGET"
            exit 1
          fi

          FILE_COUNT=$(echo "$PROMPT_FILES" | wc -l | tr -d ' ')
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT

          {
            echo "prompt_files<<__EOF_FILES__"
            echo "$PROMPT_FILES"
            echo "__EOF_FILES__"
          } >> "$GITHUB_OUTPUT"

          echo "[OK] Found $FILE_COUNT prompt files"

      - name: Build optimization prompt
        id: build
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          DRY_RUN="${{ inputs.dry_run || 'false' }}"
          PROMPT_FILES='${{ steps.targets.outputs.prompt_files }}'

          FILE_LIST=$(echo "$PROMPT_FILES" | sed 's/^/- /')

          TASK_TEMPLATE=$(cat .github/prompts/agent6-prompt-optimizer-task.md)

          TASK_PROMPT=$(echo "$TASK_TEMPLATE" | \
            sed "s|{{PROMPT_FILES}}|$FILE_LIST|g" | \
            sed "s|{{DATE}}|$TODAY|g")

          {
            echo "$TASK_PROMPT"
            echo ""
            echo "## Agent Performance Metrics (last 14 days)"
            echo ""
            echo '```json'
            cat /tmp/agent-metrics.json
            echo '```'
            echo ""
            if [ "$DRY_RUN" = "true" ]; then
              echo "## MODE: DRY RUN"
              echo ""
              echo "Do NOT modify any prompt files. Only produce the optimization report."
            fi
          } > /tmp/optimizer-prompt.txt

          {
            echo "task_prompt<<__EOF_PROMPT__"
            cat /tmp/optimizer-prompt.txt
            echo "__EOF_PROMPT__"
          } >> "$GITHUB_OUTPUT"

          echo "[OK] Optimizer prompt rendered ($(wc -l < /tmp/optimizer-prompt.txt) lines)"

      - name: Upload prep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent6-optimizer-prep-${{ github.run_id }}
          path: |
            /tmp/agent-metrics.json
          retention-days: 14
          if-no-files-found: ignore

  optimize:
    name: Run prompt optimizer agent
    needs: prepare
    uses: ./.github/workflows/agent-factory.yml
    secrets: inherit
    with:
      role: management
      task_prompt: ${{ needs.prepare.outputs.task_prompt }}
      title: 'Agent 6: Prompt Improver'
      commit_scope: ci
      commit_changes: ${{ inputs.dry_run != true }}
      timeout_minutes: 15
      branch: master

  summary:
    name: Summary
    needs: [prepare, optimize]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print summary
        run: |
          echo "## Agent 6: Prompt Improver Summary"
          echo "- Target: ${{ inputs.target_agent || 'all' }}"
          echo "- Files analyzed: ${{ needs.prepare.outputs.file_count }}"
          echo "- Dry run: ${{ inputs.dry_run || 'false' }}"
          echo "- Result: ${{ needs.optimize.result || 'skipped' }}"
